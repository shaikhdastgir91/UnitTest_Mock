name: Test Workflow

on:
    workflow_run:
        workflows: ["Build and Test .NET", " Build Workflow"]
        types:
            - completed

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup dotnet
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '10.0.x'
            - name: Run tests
              run: dotnet test UnitTest_Mock.sln --configuration Release --no-build
            
            - name: Generate Test Report
              run: dotnet test UnitTest_Mock.sln --configuration Release --no-build --logger "trx;LogFileName=test_results.trx"
            
            - name: Upload Test Report
              uses: actions/upload-artifact@v4
              with:
                    path: "**/*.trx"