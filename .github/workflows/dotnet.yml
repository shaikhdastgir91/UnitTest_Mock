name:  Build Workflow

on:
    push:
        branches:
        - main
    pull_request:
        branches:
        - main
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
         - name: Checkout code
           uses: actions/checkout@v2

         - name: Setup .NET 10
           uses: actions/setup-dotnet@v4
           with:
                dotnet-version: '10.0.x'

         - name: Restore dependencies
           run: dotnet restore

         - name: Build
           run: dotnet build --no-restore

         - name: Test Restore
           run: dotnet restore src/UnitTest_Mock.sln
        
         - name: Build Test Project
           run: dotnet build src/UnitTest_Mock.sln --configuration Release --no-restore